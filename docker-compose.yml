services:
  postgres:
    image: postgres:16-alpine
    container_name: workspaceos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workspaceos
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workspaceos"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: workspaceos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workspaceos
      MINIO_ROOT_PASSWORD: workspaceos-secret
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    container_name: workspaceos-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
